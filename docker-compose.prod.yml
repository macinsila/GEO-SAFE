# Production Docker Compose — GeoSafe
#
# Usage:
#   cp .env.prod.example .env.prod
#   # edit .env.prod — set secrets, domain, etc.
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Key differences from docker-compose.yml (dev):
#   - No source-code volume mounts (images are fully self-contained)
#   - Backend: gunicorn + uvicorn workers, no --reload
#   - Frontend: nginx static server (not `serve`)
#   - Nginx reverse proxy sits in front of both services
#   - Healthcheck uses /ready (checks DB connectivity, not just process liveness)
#   - Restart policy: unless-stopped on all services
#   - Memory + CPU limits on backend and db
#   - adminer excluded (use a jump-host or VPN if DB inspection is needed)

services:

  # ── PostgreSQL + PostGIS ───────────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: geosafe_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - geosafe_internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── FastAPI Backend (gunicorn + uvicorn workers) ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: geosafe-backend:${IMAGE_TAG:-latest}
    container_name: geosafe_backend_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      SENTRY_DSN: ${SENTRY_DSN:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_MAILTO: ${VAPID_MAILTO:-}
    # /ready probes the DB; /health is process-only (used in dev)
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/ready"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - geosafe_internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── React Frontend (nginx static) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-}
    image: geosafe-frontend:${IMAGE_TAG:-latest}
    container_name: geosafe_frontend_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geosafe_internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── Nginx reverse proxy (public entry point) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: geosafe_nginx_prod
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - geosafe_internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

volumes:
  postgres_data:

networks:
  geosafe_internal:
    driver: bridge
    # Internal-only network; only nginx exposes a port to the host
    internal: false
