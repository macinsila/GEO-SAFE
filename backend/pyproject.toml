[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["alembic/versions/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line too long — handled by formatter
    "UP007",  # use X | Y for union — requires py310+
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
