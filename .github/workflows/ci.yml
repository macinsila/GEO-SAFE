name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ── Backend: lint + tests ────────────────────────────────────────────────────
  backend:
    name: Backend (lint + pytest)
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: geosafe_user
          POSTGRES_PASSWORD: geosafe_pass
          POSTGRES_DB: geosafe_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U geosafe_user -d geosafe_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://geosafe_user:geosafe_pass@localhost:5432/geosafe_test_db
      DATABASE_URL: postgresql+asyncpg://geosafe_user:geosafe_pass@localhost:5432/geosafe_test_db
      JWT_SECRET: ci-test-suite-random-secret-32-chars-min-ok

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Run migrations
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          alembic -c alembic/alembic.ini upgrade head

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/ -v --tb=short

  # ── Frontend: lint + tests + build ──────────────────────────────────────────
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0 || true

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests --runInBand
        env:
          CI: true

      - name: Production build
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:8000
          CI: false
