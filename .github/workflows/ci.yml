name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ── Backend: lint + tests ────────────────────────────────────────────────────
  backend:
    name: Backend (lint + pytest)
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: geosafe_user
          POSTGRES_PASSWORD: geosafe_pass
          POSTGRES_DB: geosafe_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U geosafe_user -d geosafe_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://geosafe_user:geosafe_pass@localhost:5432/geosafe_test_db
      DATABASE_URL: postgresql+asyncpg://geosafe_user:geosafe_pass@localhost:5432/geosafe_test_db
      JWT_SECRET: ci-test-suite-random-secret-32-chars-min-ok

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pip-audit

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit --requirement requirements.txt --ignore-vuln PYSEC-2022-42974 || true

      - name: Run migrations
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          alembic -c alembic/alembic.ini upgrade head

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/ -v --tb=short

  # ── Secret scanning (gitleaks) ───────────────────────────────────────────────
  secrets-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Frontend: lint + tests + build ──────────────────────────────────────────
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0 || true

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests --runInBand
        env:
          CI: true

      - name: Production build
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:8000
          CI: false

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  # ── E2E smoke tests (Playwright) ────────────────────────────────────────────
  e2e:
    name: E2E smoke tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgis:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: geosafe_user
          POSTGRES_PASSWORD: geosafe_pass
          POSTGRES_DB: geosafe_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U geosafe_user -d geosafe_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://geosafe_user:geosafe_pass@localhost:5432/geosafe_test_db
      JWT_SECRET: ci-test-suite-random-secret-32-chars-min-ok
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_API_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      # ── Backend: migrate + seed + serve ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations
        working-directory: backend
        run: alembic -c alembic/alembic.ini upgrade head

      - name: Seed E2E fixtures
        run: PYTHONPATH=$(pwd)/backend python e2e/seed.py

      - name: Start API server
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # Wait until the API responds (up to 60 s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      # ── Frontend: serve built artifact ────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Serve frontend
        run: |
          npx serve -s frontend/build -l 3000 &
          # Wait until the frontend responds
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000 && break || sleep 2
          done

      # ── Playwright ────────────────────────────────────────────────────────
      - name: Install Playwright + browsers
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
