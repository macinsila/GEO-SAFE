services:
  # PostgreSQL Database with PostGIS
  db:
    image: postgis/postgis:15-3.3
    container_name: geosafe_db
    environment:
      POSTGRES_USER: geosafe_user
      POSTGRES_PASSWORD: geosafe_pass
      POSTGRES_DB: geosafe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geosafe_user -d geosafe_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geosafe_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geosafe_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${GEOSAFE_BACKEND_PORT:-8011}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://geosafe_user:geosafe_pass@db:5432/geosafe_db
      DEBUG: "false"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a long random value before starting GeoSafe}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - geosafe_network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8011}
    container_name: geosafe_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8011}
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geosafe_network

  # Adminer UI for database inspection
  adminer:
    image: adminer
    container_name: geosafe_adminer
    ports:
      - "${GEOSAFE_ADMINER_PORT:-8081}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - geosafe_network

volumes:
  postgres_data:

networks:
  geosafe_network:
    driver: bridge
