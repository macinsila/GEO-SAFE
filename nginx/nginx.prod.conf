upstream geosafe_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Security headers (complement what FastAPI already sets on /api routes)
    add_header X-Content-Type-Options   "nosniff"                    always;
    add_header X-Frame-Options          "DENY"                       always;
    add_header X-XSS-Protection         "1; mode=block"              always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Backend API ───────────────────────────────────────────────────────────
    location ~ ^/(api|health|ready|metrics|docs|openapi\.json) {
        proxy_pass         http://geosafe_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) — disable buffering so events flush immediately
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # ── React SPA ─────────────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        # Serve static file if it exists, otherwise fall back to index.html
        # for client-side routing (react-router)
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; index.html must revalidate
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip compression
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
